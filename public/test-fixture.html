<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switchy Test Fixture</title>
  <style>body { margin: 0; font-family: sans-serif; background: #f9fafb; }</style>
</head>
<body>
  <p id="status">Loading...</p>
  <script>
    // Injected by test runner via page.addInitScript
    // window.__SWITCHY_PROJECT_ID__ and window.__SWITCHY_KEY__ must be set before switchy.js loads
  </script>
  <script id="switchy-script"></script>
  <script>
    window.__SWITCHY_TEST__ = true;
    var script = document.getElementById("switchy-script");
    script.src = "/switchy.js?project=" + encodeURIComponent(window.__SWITCHY_PROJECT_ID__ || "") +
                 "&key=" + encodeURIComponent(window.__SWITCHY_KEY__ || "");
    document.getElementById("status").textContent = "Switchy loaded";
  </script>
</body>
</html>
